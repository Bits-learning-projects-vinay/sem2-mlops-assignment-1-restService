name: CI/CD Pipeline for Flask Model

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Black (Formatting Check)
        run: black --check .

      - name: Run Flake8 (Code Quality Check)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test:
    name: Run Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pandas boto3 flask scikit-learn prometheus-flask-exporter

      - name: Run tests
        run: |
          python -m pytest tests/

  deploy:
    name: Deploy to EC2
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          # Includes the app, custom modules, and the monitoring config
          source: "model_service.py,requirements.txt,Dockerfile,dataPreProcessingAndFeatureEngg.py,dataSetLoad.py,prometheus.yml"
          target: ${{ secrets.EC2_APP_DIR }}
          debug: true

      - name: Build and Run Containers on EC2
        uses: appleboy/ssh-action@v1.2.4
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
          MODEL_S3_KEY: ${{ secrets.MODEL_S3_KEY }}
          MODEL_S3_REGION: ${{ secrets.MODEL_S3_REGION }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: MODEL_S3_BUCKET,MODEL_S3_KEY,MODEL_S3_REGION,APP_DIR
          script: |
            set -e
            cd "$APP_DIR"
            
            # 1. Fix Docker permissions
            sudo chmod 777 /var/run/docker.sock

            # 2. Prevent "No space left on device" by clearing old images/cache
            docker system prune -f 

            # 3. Stop existing containers
            docker stop flask-model-service prometheus 2>/dev/null || true
            docker rm flask-model-service prometheus 2>/dev/null || true

            # 4. Build Flask App (No-cache ensures scikit-learn 1.8.0 is fresh)
            docker build --no-cache -t flask-model-service .

            # 5. Run Flask Model Service
            docker run -d \
              --name flask-model-service \
              -p 8000:8000 \
              -e MODEL_S3_BUCKET="$MODEL_S3_BUCKET" \
              -e MODEL_S3_KEY="$MODEL_S3_KEY" \
              -e MODEL_S3_REGION="$MODEL_S3_REGION" \
              flask-model-service

            # 6. Run Prometheus Monitoring Service
            # Mounts the copied prometheus.yml into the container
            docker run -d \
              --name prometheus \
              -p 9090:9090 \
              -v "$(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml" \
              prom/prometheus