name: Deploy EC2 Flask Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy app files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          # Ensure all necessary files are included
          source: "model_service.py,requirements.txt,scripts/ec2_bootstrap.sh"
          target: ${{ secrets.EC2_APP_DIR }}

      - name: Deploy and restart service on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
          MODEL_S3_KEY: ${{ secrets.MODEL_S3_KEY }}
          MODEL_S3_REGION: ${{ secrets.MODEL_S3_REGION }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: MODEL_S3_BUCKET,MODEL_S3_KEY,MODEL_S3_REGION,APP_DIR
          script: |
            set -e
            # Navigate to app directory
            cd "$APP_DIR"
            
            # Fix file structure if scp put them in a subfolder
            cp scripts/ec2_bootstrap.sh .
            chmod +x ec2_bootstrap.sh
            
            # Run the bootstrap script to install dependencies and start Flask
            # We pass variables into the script or a .env file
            ./ec2_bootstrap.sh