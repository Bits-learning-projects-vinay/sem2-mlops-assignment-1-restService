name: CI/CD Pipeline for Flask Model

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # Early opt-in to Node.js 24 to ensure compatibility across all JS actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # Updated to v6 to support Node 24 natively
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Black (Formatting Check)
        run: black --check .

      - name: Run Flake8 (Code Quality Check)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings (Max line length 120 to match Black)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test:
    name: Run Unit Tests
    needs: lint # Only run tests if linting passes
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/

  deploy:
    name: Deploy to EC2
    needs: test # Only deploy if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "model_service.py,requirements.txt,Dockerfile"
          target: ${{ secrets.EC2_APP_DIR }}
          debug: true
      - name: Build and Run Docker Container on EC2
        # Updated to v1.2.4 for latest security and runtime support
        uses: appleboy/ssh-action@v1.2.4
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
          MODEL_S3_KEY: ${{ secrets.MODEL_S3_KEY }}
          MODEL_S3_REGION: ${{ secrets.MODEL_S3_REGION }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: MODEL_S3_BUCKET,MODEL_S3_KEY,MODEL_S3_REGION,APP_DIR
          script: |
            set -e
            cd "$APP_DIR"
            
            if ! [ -x "$(command -v docker)" ]; then
              sudo yum update -y && sudo yum install -y docker
              sudo service docker start
              sudo usermod -a -G docker ${{ secrets.EC2_USER }}
            fi

            docker stop flask-model-service || true
            docker rm flask-model-service || true
            docker build -t flask-model-service .

            docker run -d \
              --name flask-model-service \
              -p 8000:8000 \
              -e MODEL_S3_BUCKET="$MODEL_S3_BUCKET" \
              -e MODEL_S3_KEY="$MODEL_S3_KEY" \
              -e MODEL_S3_REGION="$MODEL_S3_REGION" \
              flask-model-service