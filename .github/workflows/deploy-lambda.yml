name: Deploy Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6 # Updated for Node.js 24 compatibility

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated for Node.js 24 compatibility
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6 # Updated for Node.js 24 compatibility
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Lambda package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lambda.txt -t package
          cp modelRestService.py package/
          cd package
          zip -r ../lambda.zip .

      - name: Deploy Lambda code
        env:
          FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
          MODEL_S3_KEY: ${{ secrets.MODEL_S3_KEY }}
          MODEL_S3_REGION: ${{ secrets.MODEL_S3_REGION }}
        run: |
          # Check if function exists
          if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$AWS_REGION" > /dev/null 2>&1; then
            echo "Updating existing function..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://lambda.zip \
              --region "$AWS_REGION"
          else
            echo "Creating new function..."
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime python3.11 \
              --handler modelRestService.lambda_handler \
              --role "$ROLE_ARN" \
              --zip-file fileb://lambda.zip \
              --timeout 30 \
              --memory-size 512 \
              --region "$AWS_REGION"
          fi

          # The 254 error often happens here; verify env variable formatting
          echo "Updating function configuration..."
          aws lambda update-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --environment "Variables={MODEL_S3_BUCKET=$MODEL_S3_BUCKET,MODEL_S3_KEY=$MODEL_S3_KEY,MODEL_S3_REGION=$MODEL_S3_REGION}" \
            --region "$AWS_REGION"