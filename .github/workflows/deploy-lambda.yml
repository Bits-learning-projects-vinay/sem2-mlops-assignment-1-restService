name: Deploy EC2 Flask Service

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6 # Updated for Node.js 24 compatibility

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated for Node.js 24 compatibility
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6 # Updated for Node.js 24 compatibility
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Lambda package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lambda.txt -t package
          cp lambda_function.py package/
          cd package
                    jobs:
                      deploy:
                        runs-on: ubuntu-latest

                        steps:
                          - name: Check out repository
                            uses: actions/checkout@v4

                          - name: Copy service files to EC2
                            uses: appleboy/scp-action@v0.1.7
                            with:
                              host: ${{ secrets.EC2_HOST }}
                              username: ${{ secrets.EC2_USER }}
                              key: ${{ secrets.EC2_SSH_KEY }}
                              port: ${{ secrets.EC2_PORT }}
                              source: "model_service.py,requirements.txt"
                              target: ${{ secrets.EC2_APP_DIR }}

                          - name: Configure and restart service on EC2
                            uses: appleboy/ssh-action@v1.0.3
                            env:
                              MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
                              MODEL_S3_KEY: ${{ secrets.MODEL_S3_KEY }}
                              MODEL_S3_REGION: ${{ secrets.MODEL_S3_REGION }}
                              APP_DIR: ${{ secrets.EC2_APP_DIR }}
                              APP_USER: ${{ secrets.EC2_USER }}
                            with:
                              host: ${{ secrets.EC2_HOST }}
                              username: ${{ secrets.EC2_USER }}
                              key: ${{ secrets.EC2_SSH_KEY }}
                              port: ${{ secrets.EC2_PORT }}
                              envs: MODEL_S3_BUCKET,MODEL_S3_KEY,MODEL_S3_REGION,APP_DIR,APP_USER
                              script: |
                                set -e
                                mkdir -p "$APP_DIR"
                                cd "$APP_DIR"

                                python3 -m venv .venv
                                . .venv/bin/activate
                                python -m pip install --upgrade pip
                                pip install -r requirements.txt

                                cat > .env << EOF
                                MODEL_S3_BUCKET=$MODEL_S3_BUCKET
                                MODEL_S3_KEY=$MODEL_S3_KEY
                                MODEL_S3_REGION=$MODEL_S3_REGION
                                EOF

                                sudo tee /etc/systemd/system/model-service.service > /dev/null << EOF
                                [Unit]
                                Description=Flask model service
                                After=network.target

                                [Service]
                                Type=simple
                                User=$APP_USER
                                WorkingDirectory=$APP_DIR
                                EnvironmentFile=$APP_DIR/.env
                                ExecStart=$APP_DIR/.venv/bin/gunicorn --workers 2 --bind 0.0.0.0:8000 model_service:app
                                Restart=always
                                RestartSec=3

                                [Install]
                                WantedBy=multi-user.target
                                EOF

                                sudo systemctl daemon-reload
                                sudo systemctl enable model-service
                                sudo systemctl restart model-service
